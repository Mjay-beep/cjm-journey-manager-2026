<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>고객 여정별 KPI 관리</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/pretendard/1.3.9/static/pretendard.min.css" rel="stylesheet">
<style>
:root{--bg:#F7F8FB;--wh:#FFF;--g1:#F1F3F5;--g2:#E9ECEF;--g3:#DEE2E6;--tx:#212529;--tx2:#495057;--tx3:#868E96;--tx4:#ADB5BD;--ac:#2563EB;--acL:#EFF6FF;--gn:#059669;--gnL:#ECFDF5;--rd:#DC2626;--rdL:#FEF2F2;--pp:#7C3AED;--ppL:#F5F3FF;--sh:0 1px 3px rgba(0,0,0,.05);--sh2:0 4px 12px rgba(0,0,0,.08)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Pretendard','Apple SD Gothic Neo',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;-webkit-font-smoothing:antialiased}

/* Header - CJM Manager 스타일 */
.header{background:linear-gradient(135deg,#0C111D 0%,#1C2333 50%,#0C111D 100%);padding:20px 32px 16px;color:#fff;position:sticky;top:0;z-index:100;border-bottom:1px solid #2a3040}
.header-row{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.logo{width:34px;height:34px;border-radius:9px;background:#2E3B5E;display:flex;align-items:center;justify-content:center;font-size:18px;line-height:1;flex-shrink:0}
.header-title{font-size:18px;font-weight:800;letter-spacing:-.4px}
.header-right{margin-left:auto;display:flex;gap:8px;align-items:center}
.header-link{padding:6px 14px;border-radius:7px;border:1px solid #3A4260;background:transparent;color:#C8CDD9;font-size:12px;font-weight:600;cursor:pointer;text-decoration:none;transition:.15s;white-space:nowrap}
.header-link:hover{background:#242D44;color:#fff}
.header-meta{font-size:11px;color:#5A6178;font-family:monospace}
.header-desc{font-size:12.5px;color:#7B8399;margin-top:8px;line-height:1.6;max-width:860px}

.main{max-width:1400px;margin:0 auto;padding:28px 40px 60px}

.ctrls-bar{display:flex;gap:8px;margin-bottom:20px}
.ctrl-btn{padding:7px 16px;border-radius:7px;border:1px solid var(--g3);background:var(--wh);color:var(--tx2);cursor:pointer;font-size:12px;font-family:'Pretendard',sans-serif;font-weight:500;transition:.12s;box-shadow:var(--sh)}
.ctrl-btn:hover{background:var(--g1);color:var(--tx)}

.tag{display:inline-block;font-size:10px;font-weight:700;padding:2px 7px;border-radius:3px;margin-right:5px;vertical-align:middle;letter-spacing:.3px}
.tag-l1{background:#E0E7FF;color:#3730A3}.tag-l2{background:#DBEAFE;color:#1E40AF}

.l1-sec{margin-bottom:24px}
.l1-bar{display:flex;align-items:center;gap:10px;padding:14px 20px;background:var(--wh);border:1px solid var(--g2);border-radius:10px;box-shadow:var(--sh)}
.l1-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.l1-name{font-size:15px;font-weight:700;flex:1}

.l1-kpis{background:var(--wh);border:1px solid var(--g2);border-top:none;border-radius:0 0 10px 10px;overflow:hidden}
.l1-kpis:empty{display:none}

.l2-list{margin:8px 0 0 20px}
.l2-card{background:var(--wh);border:1px solid var(--g2);border-radius:8px;margin-bottom:6px;box-shadow:var(--sh);overflow:hidden}
.l2-hdr{display:flex;align-items:center;gap:8px;padding:11px 16px;cursor:pointer;user-select:none}
.l2-chv{width:15px;height:15px;color:var(--tx4);transition:transform .2s;flex-shrink:0}
.l2-card.open .l2-chv{transform:rotate(180deg)}
.l2-nm{font-size:13px;font-weight:600;flex:1}
.l2-badge{font-size:11px;color:var(--tx3);font-family:monospace;padding:1px 6px;background:var(--g1);border-radius:3px}
.l2-body{display:none;border-top:1px solid var(--g1)}.l2-card.open .l2-body{display:block}

.kt{width:100%;border-collapse:collapse}
.kt th{text-align:left;font-size:10px;color:var(--tx3);padding:8px 16px;font-weight:600;text-transform:uppercase;letter-spacing:.3px;background:var(--g1);border-bottom:1px solid var(--g2)}
.kt td{padding:8px 16px;font-size:13px;border-bottom:1px solid var(--g1);vertical-align:top}
.kt tr:last-child td{border-bottom:none}.kt tr:hover td{background:#FAFBFC}
.kpi-name{font-weight:600;color:var(--tx)}.kpi-desc{color:var(--tx2);font-size:12px;line-height:1.5}
.kpi-formula{color:var(--tx3);font-size:11px;font-family:monospace;line-height:1.5}
.tc{font-size:10px;font-weight:600;display:block;padding:2px 7px;border-radius:3px;text-align:center;white-space:nowrap;line-height:1.4}
.tc-일간{background:var(--gnL);color:var(--gn)}.tc-월간{background:var(--acL);color:var(--ac)}.tc-분기{background:var(--ppL);color:var(--pp)}
.tc-일간\/월간{background:#FFF7ED;color:#C2410C}
.act-btns{display:flex;gap:3px;opacity:0;transition:.1s}
.kt tr:hover .act-btns{opacity:1}
.act-btn{border:1px solid var(--g3);border-radius:4px;cursor:pointer;font-size:11px;padding:3px 10px;background:var(--wh);color:var(--tx2);font-family:'Pretendard',sans-serif;font-weight:500;transition:.1s;white-space:nowrap}
.act-btn:hover{background:var(--g1)}.act-btn.del{color:var(--rd)}.act-btn.del:hover{background:var(--rdL);border-color:var(--rd)}
.add-row{padding:8px 16px;cursor:pointer;color:var(--ac);font-size:12px;font-weight:600;transition:.1s;display:inline-flex;align-items:center;gap:5px;border:1px solid var(--ac);border-radius:6px;margin:8px 14px 10px;background:transparent}
.add-row:hover{background:var(--acL)}
.add-l2-wrap{margin:8px 0 0 20px;position:relative;display:inline-block}
.add-l2{padding:10px 16px;border:1px dashed var(--g3);border-radius:8px;cursor:pointer;color:var(--tx3);font-size:12px;font-weight:500;transition:.12s;display:flex;align-items:center;gap:6px}
.add-l2:hover{border-color:var(--ac);color:var(--ac);background:var(--acL)}
.tooltip{display:none;position:absolute;bottom:calc(100% + 6px);left:0;background:var(--tx);color:#fff;font-size:11px;padding:7px 12px;border-radius:6px;width:300px;line-height:1.5;z-index:10;box-shadow:var(--sh2)}
.tooltip::after{content:'';position:absolute;top:100%;left:20px;border:5px solid transparent;border-top-color:var(--tx)}
.add-l2-wrap:hover .tooltip{display:block}

.ft{max-width:1400px;margin:0 auto;padding:20px 40px;text-align:center;color:var(--tx4);font-size:11px;display:flex;flex-direction:column;gap:3px}

.mbg{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.25);z-index:200;align-items:center;justify-content:center;backdrop-filter:blur(2px)}
.mbg.show{display:flex}
.modal{background:var(--wh);border-radius:14px;padding:26px;width:500px;max-width:92vw;box-shadow:var(--sh2)}
.modal h3{font-size:17px;font-weight:700;margin-bottom:2px}
.modal .msub{font-size:12px;color:var(--tx3);margin-bottom:14px}
.modal label{font-size:11px;color:var(--tx2);display:block;margin-bottom:3px;margin-top:12px;font-weight:600}
.modal input,.modal textarea,.modal select{width:100%;padding:9px 12px;border:1px solid var(--g3);border-radius:7px;background:var(--wh);color:var(--tx);font-size:13px;font-family:'Pretendard',sans-serif;outline:none;transition:.12s}
.modal input:focus,.modal textarea:focus,.modal select:focus{border-color:var(--ac);box-shadow:0 0 0 3px rgba(37,99,235,.08)}
.modal textarea{resize:vertical;min-height:50px}
.mbtns{display:flex;gap:6px;margin-top:18px;justify-content:flex-end}
.mbtns button{padding:9px 20px;border-radius:7px;border:none;font-size:13px;cursor:pointer;font-family:'Pretendard',sans-serif;font-weight:600;transition:.12s}
.mbtns .ok{background:var(--ac);color:#fff}.mbtns .ok:hover{background:#1D4ED8}
.mbtns .danger{background:var(--rd);color:#fff}.mbtns .danger:hover{background:#B91C1C}
.mbtns .cc{background:var(--g1);color:var(--tx2);border:1px solid var(--g2)}.mbtns .cc:hover{background:var(--g2)}
.cbox{background:var(--g1);padding:12px 14px;border-radius:8px;margin:12px 0;border:1px solid var(--g2)}
.cbox .ck{font-weight:700;font-size:14px}.cbox .cd{font-size:12px;color:var(--tx2);margin-top:2px;line-height:1.5}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(16px);padding:8px 20px;border-radius:7px;font-size:12px;font-weight:500;z-index:300;opacity:0;transition:.3s;pointer-events:none;box-shadow:var(--sh2)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}.toast.ok{background:#065F46;color:#A7F3D0}

@media(max-width:768px){.header{padding:14px 16px}.main{padding:16px 14px 40px}.l2-list{margin-left:10px}.kt th,.kt td{padding:5px 8px}.act-btns{opacity:1}}
</style>
</head>
<body>
<div class="header">
  <div class="header-row">
    <div class="logo">📊</div>
    <div class="header-title">고객 여정별 KPI 관리</div>
    <div class="header-right">
      <span class="header-meta" id="meta"></span>
      <a class="header-link" href="https://cjm-journey-manager-2026.vercel.app/" target="_blank">🌏 SKT 고객여정 MANAGER 바로가기</a>
    </div>
  </div>
  <div class="header-desc">이 사이트는 고객 여정별 KPI 지표를 관리하는 사이트입니다. KPI 지표는 L1과 L2의 고객 여정 단계까지만 관리합니다. 여정별 필요 KPI 지표와 설명을 자유롭게 입력하시면 됩니다.</div>
</div>
<div class="main" id="main"></div>
<div class="ft"><span>관련 문의: Next플랫폼CX팀 박민재 매니저</span><span>Next플랫폼CX팀 · 고객여정 KPI Dashboard</span></div>
<div class="mbg" id="mbg" onclick="if(event.target===this)cm()"><div class="modal" id="mdl"></div></div>
<div class="toast" id="toast"></div>
<iframe name="_sf" id="_sf" style="display:none"></iframe>

<script>
const API='https://script.google.com/macros/s/AKfycbwckTK8mJb1nf3ZZ1rPG7114DJJzgu0T93wdQi4S6LpvHf3MqqIlnxxa7zuk7b33RJyVA/exec';

const svgC='<svg class="l2-chv" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z"/></svg>';

function kt(items,l1,l2,lv){
  let h='<table class="kt"><thead><tr><th style="width:18%">KPI 지표명</th><th style="width:30%">KPI 설명</th><th>산식/정의</th><th style="width:44px">주기</th><th style="width:90px"></th></tr></thead><tbody>';
  items.forEach((m,i)=>{
    h+='<tr><td class="kpi-name">'+esc(m.k)+'</td><td class="kpi-desc">'+esc(m.desc)+'</td><td class="kpi-formula">'+esc(m.formula)+'</td><td><span class="tc tc-'+m.cy+'">'+m.cy+'</span></td><td><div class="act-btns"><button class="act-btn" onclick="event.stopPropagation();oe(\''+esc(l1)+'\',\''+esc(l2)+'\','+i+',\''+lv+'\')">수정</button><button class="act-btn del" onclick="event.stopPropagation();od(\''+esc(l1)+'\',\''+esc(l2)+'\','+i+',\''+lv+'\')">삭제</button></div></td></tr>';
  });
  h+='</tbody></table><div class="add-row" onclick="event.stopPropagation();oa(\''+esc(l1)+'\',\''+esc(l2)+'\',\''+lv+'\')"><span class="tag tag-'+lv+'">'+lv.toUpperCase()+'</span> KPI 추가</div>';
  return h;
}

function render(){
  let h='<div class="ctrls-bar"><button class="ctrl-btn" onclick="tog(1)">모두 펼치기</button><button class="ctrl-btn" onclick="tog(0)">모두 접기</button></div>';
  L1O.forEach(l1=>{
    const co=L1C[l1]||'#666',l2s=D[l1]||{},l1k=L1K[l1]||[];
    h+='<div class="l1-sec"><div class="l1-bar"><div class="l1-dot" style="background:'+co+'"></div><div class="l1-name"><span class="tag tag-l1">L1</span>'+esc(l1)+'</div></div>';
    if(l1k.length) h+='<div class="l1-kpis">'+kt(l1k,l1,'','l1')+'</div>';
    else h+='<div class="l1-kpis">'+kt([],l1,'','l1')+'</div>';
    h+='<div class="l2-list">';
    Object.entries(l2s).forEach(([l2,ks])=>{
      h+='<div class="l2-card"><div class="l2-hdr" onclick="this.parentElement.classList.toggle(\'open\')">'+svgC+'<div class="l2-nm"><span class="tag tag-l2">L2</span>'+esc(l2)+'</div><span class="l2-badge">'+ks.length+'</span></div><div class="l2-body">'+kt(ks,l1,l2,'l2')+'</div></div>';
    });
    h+='<div class="add-l2-wrap"><div class="tooltip">희망하는 KPI를 지정할 L2 액티비티가 없을 경우,<br>액티비티를 추가하면서 KPI를 입력하세요.</div><div class="add-l2" onclick="oal2(\''+esc(l1)+'\')"><span class="tag tag-l2">L2</span> 액티비티 추가 <span style="color:var(--tx4);font-size:11px">ⓘ</span></div></div>';
    h+='</div></div>';
  });
  document.getElementById('main').innerHTML=h;
}

// Modal
function tog(o){document.querySelectorAll('.l2-card').forEach(c=>{o?c.classList.add('open'):c.classList.remove('open')});}
function cm(){document.getElementById('mbg').classList.remove('show');}

function oa(l1,l2,lv){
  const tgt=lv==='l1'?'<span class="tag tag-l1">L1</span> '+esc(l1):'<span class="tag tag-l1">L1</span> '+esc(l1)+' → <span class="tag tag-l2">L2</span> '+esc(l2);
  document.getElementById('mdl').innerHTML='<h3>KPI 추가</h3><div class="msub">'+tgt+'</div><label>KPI 지표명 *</label><input id="mk" placeholder="예: 앱 설치 전환율"><label>KPI 설명</label><textarea id="md" placeholder="지표에 대한 설명"></textarea><label>산식/정의 (예시)</label><textarea id="mf" placeholder="예: 전환 수 / 전체 유입 수 × 100"></textarea><label>측정주기</label><select id="mc"><option>일간</option><option selected>월간</option><option>분기</option></select><label>이름 *</label><input id="mw" placeholder="이름"><div class="mbtns"><button class="cc" onclick="cm()">취소</button><button class="ok" onclick="da(\''+esc(l1)+'\',\''+esc(l2)+'\',\''+lv+'\')">추가</button></div>';
  document.getElementById('mbg').classList.add('show');setTimeout(()=>document.getElementById('mk').focus(),80);
}
function da(l1,l2,lv){
  const k=document.getElementById('mk').value.trim(),desc=document.getElementById('md').value.trim(),formula=document.getElementById('mf').value.trim(),cy=document.getElementById('mc').value,w=document.getElementById('mw').value.trim();
  if(!k||!w){alert('지표명과 이름을 입력해주세요.');return;}
  const h=lv.toUpperCase()+' KPI 추가';
  if(lv==='l1'){if(!L1K[l1])L1K[l1]=[];L1K[l1].push({k,desc,formula,cy,w,h});}
  else{if(!D[l1])D[l1]={};if(!D[l1][l2])D[l1][l2]=[];D[l1][l2].push({k,desc,formula,cy,w,h});}
  cm();um();render();sync();
}

function oe(l1,l2,i,lv){
  const m=lv==='l1'?L1K[l1][i]:D[l1][l2][i];
  const tgt=lv==='l1'?'<span class="tag tag-l1">L1</span> '+esc(l1):'<span class="tag tag-l1">L1</span> '+esc(l1)+' → <span class="tag tag-l2">L2</span> '+esc(l2);
  document.getElementById('mdl').innerHTML='<h3>KPI 수정</h3><div class="msub">'+tgt+'</div><label>KPI 지표명</label><input id="mk" value="'+esc(m.k)+'"><label>KPI 설명</label><textarea id="md">'+esc(m.desc)+'</textarea><label>산식/정의 (예시)</label><textarea id="mf">'+esc(m.formula)+'</textarea><label>측정주기</label><select id="mc"><option'+(m.cy==='일간'?' selected':'')+'>일간</option><option'+(m.cy==='월간'?' selected':'')+'>월간</option><option'+(m.cy==='분기'?' selected':'')+'>분기</option><option'+(m.cy==='일간/월간'?' selected':'')+'>일간/월간</option></select><label>이름 *</label><input id="mw" placeholder="이름" value="'+esc(m.w)+'"><div class="mbtns"><button class="cc" onclick="cm()">취소</button><button class="ok" onclick="ce(\''+esc(l1)+'\',\''+esc(l2)+'\','+i+',\''+lv+'\')">수정 확인</button></div>';
  document.getElementById('mbg').classList.add('show');
}
function ce(l1,l2,i,lv){
  const k=document.getElementById('mk').value.trim(),desc=document.getElementById('md').value.trim(),formula=document.getElementById('mf').value.trim(),cy=document.getElementById('mc').value,w=document.getElementById('mw').value.trim();
  if(!k||!w){alert('지표명과 이름을 입력해주세요.');return;}
  document.getElementById('mdl').innerHTML='<h3>수정 확인</h3><p style="font-size:11px;color:var(--tx3)">아래 내용으로 수정하시겠습니까?</p><div class="cbox"><div class="ck">'+esc(k)+'</div><div class="cd">'+esc(desc)+'</div><div class="cd" style="font-family:monospace;font-size:10px;color:var(--tx3)">'+esc(formula)+'</div><div class="cd"><span class="tc tc-'+cy+'" style="display:inline-block">'+cy+'</span></div></div><div class="mbtns"><button class="cc" onclick="oe(\''+esc(l1)+'\',\''+esc(l2)+'\','+i+',\''+lv+'\')">← 돌아가기</button><button class="ok" onclick="de(\''+esc(l1)+'\',\''+esc(l2)+'\','+i+',\''+lv+'\')">확인</button></div>';
  window._et={k,desc,formula,cy,w};
}
function de(l1,l2,i,lv){
  const{k,desc,formula,cy,w}=window._et;
  const h=lv.toUpperCase()+' KPI 수정';
  if(lv==='l1')L1K[l1][i]={k,desc,formula,cy,w,h};else D[l1][l2][i]={k,desc,formula,cy,w,h};
  cm();um();render();sync();
}

function od(l1,l2,i,lv){
  const m=lv==='l1'?L1K[l1][i]:D[l1][l2][i];
  const tgt=lv==='l1'?esc(l1):esc(l1)+' → '+esc(l2);
  document.getElementById('mdl').innerHTML='<h3>KPI 삭제</h3><p style="font-size:11px;color:var(--tx3)">아래 KPI를 삭제하시겠습니까?</p><div class="cbox"><div class="ck">'+esc(m.k)+'</div><div class="cd">'+esc(m.desc)+'</div><div class="cd" style="color:var(--tx3)">'+tgt+'</div></div><label>이름 *</label><input id="mw" placeholder="이름"><div class="mbtns"><button class="cc" onclick="cm()">취소</button><button class="danger" onclick="dd(\''+esc(l1)+'\',\''+esc(l2)+'\','+i+',\''+lv+'\')">삭제</button></div>';
  document.getElementById('mbg').classList.add('show');
}
function dd(l1,l2,i,lv){
  const w=document.getElementById('mw').value.trim();
  if(!w){alert('이름을 입력해주세요.');return;}
  if(lv==='l1'){L1K[l1].splice(i,1);if(!L1K[l1].length)delete L1K[l1];}
  else{D[l1][l2].splice(i,1);if(!D[l1][l2].length)delete D[l1][l2];if(D[l1]&&!Object.keys(D[l1]).length)delete D[l1];}
  cm();um();render();sync();
}

function oal2(l1){
  document.getElementById('mdl').innerHTML='<h3>L2 액티비티 추가</h3><div class="msub"><span class="tag tag-l1">L1</span> '+esc(l1)+'</div><label>L2 액티비티명 *</label><input id="ml2" placeholder="예: 로밍 서비스 이용"><label>첫 번째 KPI 지표명 *</label><input id="mk" placeholder="예: 로밍 데이터 사용량"><label>KPI 설명</label><textarea id="md" placeholder="지표 설명"></textarea><label>산식/정의 (예시)</label><textarea id="mf" placeholder="예: 사용량 / 전체 × 100"></textarea><label>측정주기</label><select id="mc"><option>일간</option><option selected>월간</option><option>분기</option></select><label>이름 *</label><input id="mw" placeholder="이름"><div class="mbtns"><button class="cc" onclick="cm()">취소</button><button class="ok" onclick="dal2(\''+esc(l1)+'\')">추가</button></div>';
  document.getElementById('mbg').classList.add('show');setTimeout(()=>document.getElementById('ml2').focus(),80);
}
function dal2(l1){
  const l2=document.getElementById('ml2').value.trim(),k=document.getElementById('mk').value.trim(),desc=document.getElementById('md').value.trim(),formula=document.getElementById('mf').value.trim(),cy=document.getElementById('mc').value,w=document.getElementById('mw').value.trim();
  if(!l2||!k||!w){alert('L2명, KPI 지표명, 이름을 입력해주세요.');return;}
  if(!D[l1])D[l1]={};if(D[l1][l2]){alert('이미 존재하는 L2입니다.');return;}
  const h='L2 액티비티 및 KPI 추가';
  D[l1][l2]=[{k,desc,formula,cy,w,h}];cm();um();render();sync();
}

function sync(){
  try{
    const form=document.createElement('form');form.method='POST';form.action=API;form.target='_sf';form.style.display='none';
    const input=document.createElement('input');input.type='hidden';input.name='data';input.value=JSON.stringify({action:'sync',data:toR()});
    form.appendChild(input);document.body.appendChild(form);form.submit();form.remove();
    toast('시트에 저장되었습니다');
  }catch(e){toast('저장 요청을 보냈습니다');}
}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.className='toast show ok';setTimeout(()=>t.className='toast',2500);}

proc(E);render();
</script>
</body>
</html>
